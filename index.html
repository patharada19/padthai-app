<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PadThai POS</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#16a34a">

  <!-- UI -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Install Button -->
  <button id="installBtn"
    style="display:none; position:fixed; bottom:20px; right:20px;
    padding:12px 16px; background:#16a34a; color:white;
    border-radius:12px; border:none; font-size:16px;">
    📲 ติดตั้งแอป
  </button>

  <!-- Header -->
  <div class="bg-green-600 text-white p-4 text-xl font-bold">
    🍜 PadThai POS
  </div>

  <!-- Content -->
  <div class="p-4">

    <button onclick="createOrder()" class="bg-green-500 text-white px-4 py-2 rounded">
      ➕ เพิ่มออเดอร์
    </button>

    <div id="orderList" class="mt-4 space-y-3"></div>

  </div>

  <!-- SCRIPT -->
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwS_Hx7PXYrgWM8sGwYPh1-Up3tnm4PoNYS-kwXTIdoM0nEKAiYs32X6XTdUTOyYpmerg/exec";

    let isSubmitting = false;
    let lastOrderIds = [];

    // ✅ Unique ID (กันชน)
    function generateOrderId() {
      return "PUM-" + Date.now() + "-" + Math.random().toString(36).substr(2,5);
    }

    // ✅ API CALL (มี error handling)
    async function apiFetch(data) {
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(data)
        });

        return await res.json();
      } catch (err) {
        console.error("API ERROR:", err);
        alert("❌ เน็ตมีปัญหา");
      }
    }

    // ✅ Create Order
    async function createOrder() {
      if (isSubmitting) return;
      isSubmitting = true;

      const orderId = generateOrderId();

      await apiFetch({
        action: "createOrder",
        orderId: orderId,
        status: "pending"
      });

      isSubmitting = false;

      fetchOrders();
    }

    // ✅ Fetch Orders
    async function fetchOrders() {
      const res = await apiFetch({ action: "getOrders" });

      if (!res || !res.data) return;

      renderOrders(res.data);
      detectNewOrders(res.data);
    }

    // ✅ Render UI
    function renderOrders(orders) {
      const container = document.getElementById("orderList");
      container.innerHTML = "";

      orders.forEach(o => {
        const div = document.createElement("div");

        div.className = "bg-white p-4 rounded shadow";

        div.innerHTML = `
          <div class="font-bold">${o.orderId}</div>
          <div class="text-sm">สถานะ: ${o.status}</div>
          <button onclick="completeOrder('${o.orderId}')"
            class="mt-2 bg-green-500 text-white px-3 py-1 rounded">
            ✔ เสร็จแล้ว
          </button>
        `;

        container.appendChild(div);
      });
    }

    // ✅ Complete Order
    async function completeOrder(id) {
      await apiFetch({
        action: "updateOrder",
        orderId: id,
        status: "done"
      });

      fetchOrders();
    }

    // ✅ Detect New Order (เสียงแจ้งเตือน)
    function detectNewOrders(orders) {
      const ids = orders.map(o => o.orderId);

      const newOnes = ids.filter(id => !lastOrderIds.includes(id));

      if (newOnes.length > 0) {
        playSound();
      }

      lastOrderIds = ids;
    }

    function playSound() {
      const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
      audio.play();
    }

    // ✅ Auto Sync
    setInterval(fetchOrders, 5000);

    // ------------------------
    // 🔥 PWA SECTION
    // ------------------------

    // ✅ Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("SW OK"))
        .catch(err => console.error("SW ERROR:", err));
    }

    // ✅ Install App
    let deferredPrompt;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;

      const btn = document.getElementById("installBtn");
      btn.style.display = "block";

      btn.onclick = () => {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
        });
      };
    });

    // โหลดครั้งแรก
    fetchOrders();

  </script>

</body>
</html>
